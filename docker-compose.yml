services:
  postgres:
    image: postgres:16
    container_name: olist_bi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: agentic_bi_copilot_app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BI_READONLY_DATABASE_URL: postgresql+psycopg2://${BI_READONLY_USER}:${BI_READONLY_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8501:8501"
    depends_on:
      - postgres
    volumes:
      - .:/app

volumes:
  postgres_data: